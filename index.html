<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面跳转中</title>
    <!-- 防缓存 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="canonical" href="">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, "Microsoft Yahei", sans-serif;
        }
        body {
            min-height: 100vh;
            background: #0f141e;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        /* 微弱星光背景 */
        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(100, 220, 220, 0.12) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.6;
            z-index: -1;
        }
        /* 主卡片 */
        .jump-card {
            background: rgba(25, 32, 48, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 52px 36px;
            width: 92%;
            max-width: 440px;
            text-align: center;
            border: 1px solid rgba(110, 230, 230, 0.15);
            box-shadow: 0 0 40px rgba(80, 200, 200, 0.08);
        }
        /* 环形加载图标 */
        .loader {
            width: 72px;
            height: 72px;
            margin: 0 auto 24px;
            border: 4px solid rgba(110, 230, 230, 0.15);
            border-top-color: #4fd1c5;
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h1 {
            color: #ffffff;
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 14px;
        }
        .desc-text {
            color: #a0b4c9;
            font-size: 15px;
            line-height: 1.7;
        }
        #count-num {
            font-size: 52px;
            font-weight: 700;
            color: #4fd1c5;
            margin: 12px 0 28px;
        }
        /* 进度条 */
        .progress-box {
            width: 100%;
            height: 7px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 28px;
        }
        .progress-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #4fd1c5, #38b2ac);
            border-radius: 999px;
            transition: width 1s linear;
        }
        /* 选项区域 */
        .check-group {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 32px;
            font-size: 14px;
            color: #c2d2e2;
        }
        .check-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #4fd1c5;
        }
        /* 按钮样式 */
        .btn-main {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            background: linear-gradient(135deg, #4fd1c5, #319795);
            color: #0b131c;
            margin-bottom: 14px;
        }
        .btn-main:hover {
            filter: brightness(1.15);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(79, 209, 197, 0.25);
        }
        .btn-copy {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid rgba(79, 209, 197, 0.3);
            background: transparent;
            color: #4fd1c5;
            font-size: 15px;
            cursor: pointer;
            transition: 0.25s;
        }
        .btn-copy:hover {
            background: rgba(79, 209, 197, 0.08);
        }
        /* 隐藏复制输入框 */
        #copyInput{
            position: absolute;
            left: -9999px;
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="jump-card">
        <div class="loader"></div>
        <h1>即将跳转至目标站点</h1>
        <p class="desc-text">页面将在 <span id="count-num">5</span> 秒后自动跳转</p>
        <div class="progress-box">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="check-group">
            <label>
                <input type="checkbox" id="autoJump" checked>
                自动跳转
            </label>
            <label>
                <input type="checkbox" id="newTab">
                新标签打开
            </label>
        </div>
        <button class="btn-main" id="jumpBtn">立即访问</button>
        <button class="btn-copy" id="copyUrlBtn">复制目标链接</button>
        <!-- 隐藏输入框用于降级复制 -->
        <input id="copyInput" readonly>
    </div>

<script>
// ========== 修改这里两个参数即可 ==========
const WAIT_SECOND = 5;
const TARGET_WEB = "http://261d3731.r38.cpolar.top";
// ==========================================

// 拼接原页面参数
const params = window.location.search;
let jumpUrl = TARGET_WEB + params;

// 赋值canonical标签
document.querySelector("link[rel='canonical']").href = jumpUrl;

// 记录来源地址
if(document.referrer) localStorage.setItem("jump_source", document.referrer);
console.log("来路页面：", document.referrer, "跳转地址：", jumpUrl);

// 移动端文字替换
function isMobileDevice() {
    return /Android|iPhone|iPad|iPod|iOS/.test(navigator.userAgent);
}
if(isMobileDevice()) {
    document.querySelector(".desc-text").innerHTML = "移动端适配跳转，<span id='count-num'>"+WAIT_SECOND+"</span> 秒后自动前往";
}

// 倒计时进度逻辑
let count = WAIT_SECOND;
const countDom = document.getElementById("count-num");
const barDom = document.getElementById("progress-bar");
let timer = null;

function goJump() {
    const blank = document.getElementById("newTab").checked;
    blank ? window.open(jumpUrl, "_blank") : window.location.href = jumpUrl;
}

timer = setInterval(() => {
    if (!document.getElementById("autoJump").checked) return;
    count--;
    countDom.innerText = count;
    barDom.style.width = (count / WAIT_SECOND) * 100 + "%";
    if (count <= 0) {
        clearInterval(timer);
        goJump();
    }
}, 1000);

// 立即跳转按钮
document.getElementById("jumpBtn").onclick = () => {
    clearInterval(timer);
    goJump();
};

// 【修复后的复制函数，双层兼容】
document.getElementById("copyUrlBtn").addEventListener("click", async () => {
    const input = document.getElementById("copyInput");
    input.value = jumpUrl;
    input.select();

    try {
        // 优先使用现代剪贴板API
        await navigator.clipboard.writeText(jumpUrl);
        alert("✅ 链接复制成功，直接粘贴访问！");
    } catch (err) {
        // 降级方案：传统选中复制
        const success = document.execCommand("copy");
        if(success){
            alert("✅ 链接复制成功！");
        }else{
            alert("❌ 自动复制失败，请手动复制链接：\n" + jumpUrl);
        }
    }
});

// 断网提示
window.addEventListener("offline", () => {
    alert("网络连接中断，可复制链接手动访问网站");
});
</script>
</body>
</html>
