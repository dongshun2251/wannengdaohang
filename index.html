<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站中转站</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="canonical" href="">
    <style>
        /* 全局主题变量统一管理，全页面统一调用 */
        :root {
            /* 默认青柠主题 */
            --main: #4fd1c5;
            --main-dark: #319795;
            --main-light: rgba(79, 209, 197, 0.2);
            --main-bg-light: rgba(79, 209, 197, 0.08);
            --main-text: #0b131c;
            --glow-shadow: rgba(79, 209, 197, 0.25);
        }
        /* 薰衣草紫 */
        [data-theme="purple"] {
            --main: #a78bfa;
            --main-dark: #805ad5;
            --main-light: rgba(167, 139, 250, 0.2);
            --main-bg-light: rgba(167, 139, 250, 0.08);
            --main-text: #100c1f;
            --glow-shadow: rgba(167, 139, 250, 0.25);
        }
        /* 薄荷绿 */
        [data-theme="mint"] {
            --main: #86efac;
            --main-dark: #22c55e;
            --main-light: rgba(134, 239, 172, 0.2);
            --main-bg-light: rgba(134, 239, 172, 0.08);
            --main-text: #07170c;
            --glow-shadow: rgba(134, 239, 172, 0.25);
        }
        /* 暖橙落日 */
        [data-theme="coral"] {
            --main: #fdba74;
            --main-dark: #f97316;
            --main-light: rgba(253, 186, 116, 0.2);
            --main-bg-light: rgba(253, 186, 116, 0.08);
            --main-text: #241304;
            --glow-shadow: rgba(253, 186, 116, 0.25);
        }
        /* 深海蓝 */
        [data-theme="deepblue"] {
            --main: #93c5fd;
            --main-dark: #2563eb;
            --main-light: rgba(147, 197, 253, 0.2);
            --main-bg-light: rgba(147, 197, 253, 0.08);
            --main-text: #071224;
            --glow-shadow: rgba(147, 197, 253, 0.25);
        }
        /* 蜜桃粉 */
        [data-theme="pink"] {
            --main: #f9a8d4;
            --main-dark: #db2777;
            --main-light: rgba(249, 168, 212, 0.2);
            --main-bg-light: rgba(249, 168, 212, 0.08);
            --main-text: #200815;
            --glow-shadow: rgba(249, 168, 212, 0.25);
        }

        /* 固定深色底色，所有主题共用背景骨架 */
        :root {
            --danger: #ff7875;
            --success: #36d399;
            --bg-dark: #0f141e;
            --card-bg: rgba(25, 32, 48, 0.95);
            --text-white: #ffffff;
            --text-gray: #a0b4c9;
            --text-light: #c2d2e2;
            --border-light: rgba(110, 230, 230, 0.15);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, "Microsoft Yahei", sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b101b, #141a29);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            padding: 20px 12px;
            transition: var(--transition);
        }
        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(100, 220, 220, 0.12) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.5;
            z-index: -1;
        }
        @keyframes borderGlow {
            0%, 100% { box-shadow: 0 0 30px var(--main-light); }
            50% { box-shadow: 0 0 45px var(--main-light); }
        }
        .jump-card {
            background: var(--card-bg);
            backdrop-filter: blur(18px);
            border-radius: 26px;
            padding: 32px 24px;
            width: 94%;
            max-width: 480px;
            border: 1px solid var(--main-light);
            animation: borderGlow 4s ease-in-out infinite;
            margin-bottom: 20px;
            transition: var(--transition);
            position: relative;
            overflow: visible;
        }
        .jump-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--main), transparent);
            opacity: 0.4;
        }
        .theme-switch-btn {
            position: absolute;
            right: 16px;
            top: 16px;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid var(--main-light);
            background: var(--main-bg-light);
            color: var(--main);
            cursor: pointer;
            font-size: 13px;
            transition: var(--transition);
            z-index: 10;
            font-weight: 600;
        }
        .theme-switch-btn:hover {
            background: var(--main-light);
            border-color: var(--main);
            transform: translateY(-2px);
        }
        .loader {
            width: 72px;
            height: 72px;
            margin: 0 auto 20px;
            border: 4px solid var(--border-light);
            border-top-color: var(--main);
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
            animation-play-state: running;
        }
        .loader.paused {
            animation-play-state: paused;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h1 {
            color: var(--text-white);
            font-size: 22px;
            font-weight: 500;
            margin-bottom: 12px;
            text-align: center;
        }
        .desc-text {
            color: var(--text-gray);
            font-size: 14px;
            line-height: 1.7;
            text-align: center;
        }
        #count-num {
            font-size: 48px;
            font-weight: 700;
            color: var(--main);
            margin: 10px 0 24px;
            text-align: center;
            transition: var(--transition);
        }
        .progress-box {
            width: 100%;
            height: 7px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 24px;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--main), var(--main-dark));
            border-radius: 999px;
            transition: width 1s linear;
            position: relative;
            overflow: hidden;
        }
        .progress-bar::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: stream 1.5s infinite linear;
        }
        @keyframes stream { to { left: 100%; } }
        .domain-list-box {
            width: 100%;
            margin-bottom: 24px;
        }
        .domain-list-box > label {
            display: block;
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 10px;
        }
        .domain-empty {
            text-align: center;
            color: var(--text-gray);
            padding: 16px 0;
        }
        .home-domain-item {
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-light);
            margin-bottom: 8px;
            transition: var(--transition);
            cursor: pointer;
        }
        .home-domain-item:hover {
            transform: translateY(-2px);
            background: var(--main-bg-light);
            border-color: var(--main-light);
        }
        .home-domain-item.selected {
            border-color: var(--main);
            background: var(--main-light);
        }
        .home-domain-item.close-state {
            opacity: 0.6;
        }
        .home-name-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .domain-name {
            color: var(--text-white);
            font-size: 15px;
        }
        .domain-url {
            color: #8899aa;
            font-size: 12px;
            word-break: break-all;
            margin-bottom: 6px;
        }
        .domain-status-tag-open {
            color: var(--success);
            font-size: 13px;
        }
        .domain-status-tag-close {
            color: var(--danger);
            font-size: 13px;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn-pause {
            flex: 0 0 100px;
            padding: 14px 6px;
            border-radius: 14px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-light);
            position: relative;
            overflow: hidden;
        }
        .btn-pause:hover { background: var(--main-bg-light); color: var(--main); }
        .btn-main {
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            background: linear-gradient(135deg, var(--main), var(--main-dark));
            color: var(--main-text);
            position: relative;
            overflow: hidden;
        }
        .btn-main:disabled {
            background: #444;
            color: #999;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            filter: none;
        }
        .btn-main:hover:not(:disabled) {
            filter: brightness(1.15);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--glow-shadow);
        }
        .toggle-admin {
            width: 100%;
            margin-top: 8px;
            padding: 12px;
            border-radius: 14px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            background: var(--main-bg-light);
            color: var(--main);
            position: relative;
            overflow: hidden;
        }
        .toggle-admin:hover {
            background: var(--main-light);
            transform: translateY(-2px);
        }
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0);
            animation: rippleAnim 0.5s linear;
            pointer-events: none;
        }
        @keyframes rippleAnim { to { transform: scale(3); opacity: 0; } }
        .source-tip {
            margin-top: 12px;
            font-size: 12px;
            color: var(--text-gray);
            text-align: center;
            word-break: break-all;
        }
        .admin-modal-mask {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 9998;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        .admin-modal-box {
            width: 100%;
            max-width: 520px;
            max-height: 85vh;
            overflow-y: auto;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--main-light);
            padding: 28px 22px;
            position: relative;
        }
        .admin-modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--main-light);
            background: var(--main-bg-light);
            color: var(--main);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .admin-modal-close:hover { background: var(--main-light); }
        .admin-title {
            color: var(--main);
            margin-bottom: 16px;
            text-align: center;
            font-size: 20px;
        }
        .form-item { margin-bottom: 12px; }
        .form-item label {
            display: block;
            color: var(--text-light);
            margin-bottom: 4px;
            font-size: 14px;
        }
        .form-item input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border-light);
            color: #fff;
            outline: none;
            transition: var(--transition);
        }
        .form-item input:focus {
            border-color: var(--main);
            box-shadow: 0 0 8px var(--main-light);
        }
        .admin-check-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 10px 0;
            color: var(--text-light);
        }
        .admin-buttons {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .admin-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            min-width: 110px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .btn-login { background: linear-gradient(135deg, var(--main), var(--main-dark)); color: var(--main-text); }
        .btn-add { background: #667eea; color: #fff; }
        .btn-logout { background: #ef4444; color: #fff; }
        .btn-save-main { background: linear-gradient(135deg, #34d399, #10b981); color: #000; }
        .btn-sync-url {
            background: #22c55e;
            color: #000;
            flex: unset;
            white-space: nowrap;
            padding: 10px 16px;
        }
        .btn-export-file { background: #f59e0b; color: #000; }
        #fileInput { display: none; }
        .admin-domain-wrap { margin-top: 12px; }
        .admin-domain-title {
            color: #fff;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .admin-domain-item {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-light);
            margin-bottom: 8px;
            gap: 8px;
        }
        .admin-domain-info {
            flex: 1;
            min-width: 140px;
        }
        .status-radio-group {
            display: flex;
            gap: 10px;
        }
        .status-radio-group label {
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .radio-open { color: var(--success); }
        .radio-close { color: var(--danger); }
        .domain-op-btn-group { display: flex; gap: 6px; }
        .del-site-btn, .edit-site-btn {
            border: none;
            border-radius: 8px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
        }
        .del-site-btn { background: #ff4d4f; color: #fff; }
        .edit-site-btn { background: #667eea; color: #fff; }

        /* 仓库地址区域全新样式 */
        .repo-wrap {
            margin-top: 16px;
        }
        .repo-label {
            display: block;
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 6px;
        }
        .repo-url-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .repo-url-row input {
            flex: 1;
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border-light);
            color: #fff;
            outline: none;
            transition: var(--transition);
        }
        .repo-url-row input:focus {
            border-color: var(--main);
            box-shadow: 0 0 8px var(--main-light);
        }

        .modal-mask {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 15px;
        }
        .modal-box {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--main-light);
        }
        .modal-title {
            color: var(--main);
            font-size: 18px;
            margin-bottom: 16px;
            text-align: center;
        }
        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .modal-btn {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
        }
        .modal-cancel { background: #333; color: #fff; }
        .modal-confirm { background: linear-gradient(135deg, var(--main), var(--main-dark)); color: var(--main-text); }
        .tip-link {
            color: var(--main);
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="jump-card">
        <button class="theme-switch-btn" id="themeSwitchBtn">切换主题</button>
        <div class="loader" id="circleLoader"></div>
        <h1>即将跳转至目标站点</h1>
        <p class="desc-text">页面将在 <span id="count-num"></span> 秒后自动跳转</p>
        <div class="progress-box">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="domain-list-box">
            <label>选择目标站点</label>
            <div id="homeDomainWrap"></div>
        </div>
        <div class="btn-row">
            <button class="btn-pause" id="pauseBtn">暂停倒计时</button>
            <button class="btn-main" id="jumpBtn">立即访问</button>
        </div>
        <div class="source-tip" id="sourceTip"></div>
        <button class="toggle-admin" id="openAdminBtn">管理员配置面板</button>
    </div>

    <div class="admin-modal-mask" id="adminModalMask">
        <div class="admin-modal-box" id="adminModalBox">
            <button class="admin-modal-close" id="adminModalClose">×</button>
            <h2 class="admin-title">管理员配置</h2>
            <div id="loginArea">
                <div class="form-item">
                    <label>管理员密码</label>
                    <input type="password" id="adminPwdInput" placeholder="输入管理员密码登录">
                </div>
                <div class="admin-buttons">
                    <button class="admin-btn btn-login" id="loginBtn">登录</button>
                </div>
            </div>
            <div id="editArea" style="display:none;">
                <div class="form-item">
                    <label>本地临时修改密码（仅当前页面内存生效，不会导出/保存）</label>
                    <input type="password" id="newPwdInput" placeholder="新管理员密码">
                </div>
                <div class="form-item">
                    <label>自动跳转倒计时(秒)</label>
                    <input type="number" id="waitSecondInput" min="1" max="60">
                </div>
                <div class="admin-check-item">
                    <input type="checkbox" id="globalNewTabSwitch">
                    <label>默认新标签打开站点</label>
                </div>
                <h3 style="color:#fff;margin:16px 0 8px;font-size:15px;">新增站点（仅本机临时）</h3>
                <div class="form-item">
                    <label>站点名称</label>
                    <input id="siteNameInput" placeholder="例如：主站点">
                </div>
                <div class="form-item">
                    <label>站点URL（必须带 http:// 或 https://）</label>
                    <input id="siteUrlInput" placeholder="https://xxx.com">
                </div>
                <div class="form-item">
                    <label>站点权重（数字越小优先级越高，排队序号逻辑，默认1）</label>
                    <input type="number" id="siteWeightInput" value="1" min="0">
                </div>
                <div class="admin-domain-wrap" id="adminDomainWrap"></div>

                <div class="repo-wrap">
                    <label class="repo-label">仓库配置地址</label>
                    <div class="repo-url-row">
                        <input id="repoUrlInput" placeholder="仓库配置编辑地址">
                        <button class="admin-btn btn-sync-url" id="syncRepoUrlBtn">同步地址</button>
                    </div>
                </div>

                <!-- 新增保存配置按钮 -->
                <div class="admin-buttons">
                    <button class="admin-btn btn-save-main" id="saveConfigBtn">保存配置</button>
                    <button class="admin-btn btn-add" id="addSiteBtn">添加站点</button>
                    <button class="admin-btn btn-logout" id="logoutBtn">登出账号</button>
                    <button class="admin-btn btn-export-file" id="exportOnlineConfigBtn">导出.json文件</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-mask" id="editModal">
        <div class="modal-box">
            <h3 class="modal-title">编辑站点（仅本机临时）</h3>
            <input type="hidden" id="editSiteId">
            <div class="form-item">
                <label>站点名称</label>
                <input id="editNameInput">
            </div>
            <div class="form-item">
                <label>站点URL（必须带 http:// 或 https://）</label>
                <input id="editUrlInput">
            </div>
            <div class="form-item">
                <label>站点权重（数字越小优先级越高，排队序号逻辑）</label>
                <input type="number" id="editWeightInput" min="0">
            </div>
            <div class="admin-check-item">
                <input type="checkbox" id="editOpenCheck">
                <label>站点已开放</label>
            </div>
            <div class="modal-btns">
                <button class="modal-btn modal-cancel" id="modalCancel">取消</button>
                <button class="modal-btn modal-confirm" id="modalSave">确认修改</button>
            </div>
        </div>
    </div>

    <div class="modal-mask" id="tipModal">
        <div class="modal-box">
            <h3 class="modal-title">操作完成</h3>
            <p style="color:#fff;line-height:1.8;text-align:center;">
                config.json 已复制到剪贴板并自动下载文件<br>
                包含：倒计时、新标签、主题、上次选中ID、仓库地址、站点(名称/链接/权重/开放/ID)<br>
                不包含管理员密码、登录状态
            </p>
            <div class="modal-btns" style="margin-top:20px;">
                <button class="modal-btn modal-confirm" id="closeTipBtn">知道了</button>
            </div>
        </div>
    </div>

<script>
const STORAGE_KEY = "jump_config";
const LOGIN_STORAGE_KEY = "admin_is_login";
// 完整6套主题列表
const THEME_LIST = ["", "purple", "mint", "coral", "deepblue", "pink"];
const baseOnlineConfig = {
    waitSecond: 10,
    openNewTab: true,
    theme: "",
    lastSelectSiteId: "",
    repoUrl: "",
    domainConfig: []
};
let onlineConfig = { ...baseOnlineConfig };
// 临时缓存（编辑时暂存，不点保存不写入本地）
let tempConfig = { ...baseOnlineConfig };
let onlineConfigLoaded = false;
let modalOpenPauseFlag = false;

const openAdminBtn = document.getElementById("openAdminBtn");
const adminModalMask = document.getElementById("adminModalMask");
const adminModalClose = document.getElementById("adminModalClose");
const loginArea = document.getElementById("loginArea");
const editArea = document.getElementById("editArea");
const logoutBtn = document.getElementById("logoutBtn");
const circleLoader = document.getElementById("circleLoader");
const themeSwitchBtn = document.getElementById("themeSwitchBtn");
const saveConfigBtn = document.getElementById("saveConfigBtn");

const countDom = document.getElementById("count-num");
const barDom = document.getElementById("progress-bar");
const pauseBtn = document.getElementById("pauseBtn");
const jumpBtn = document.getElementById("jumpBtn");
const homeDomainWrap = document.getElementById("homeDomainWrap");
const adminDomainWrap = document.getElementById("adminDomainWrap");
const canonicalTag = document.querySelector("link[rel='canonical']");
const adminPwdInput = document.getElementById("adminPwdInput");
const newPwdInput = document.getElementById("newPwdInput");
const loginBtn = document.getElementById("loginBtn");
const waitSecondInput = document.getElementById("waitSecondInput");
const globalNewTabSwitch = document.getElementById("globalNewTabSwitch");
const siteNameInput = document.getElementById("siteNameInput");
const siteUrlInput = document.getElementById("siteUrlInput");
const siteWeightInput = document.getElementById("siteWeightInput");
const addSiteBtn = document.getElementById("addSiteBtn");
const exportOnlineConfigBtn = document.getElementById("exportOnlineConfigBtn");
const sourceTip = document.getElementById("sourceTip");
const editModal = document.getElementById("editModal");
const editSiteId = document.getElementById("editSiteId");
const editNameInput = document.getElementById("editNameInput");
const editUrlInput = document.getElementById("editUrlInput");
const editWeightInput = document.getElementById("editWeightInput");
const editOpenCheck = document.getElementById("editOpenCheck");
const modalCancel = document.getElementById("modalCancel");
const modalSave = document.getElementById("modalSave");
const tipModal = document.getElementById("tipModal");
const closeTipBtn = document.getElementById("closeTipBtn");
const repoUrlInput = document.getElementById("repoUrlInput");
const syncRepoUrlBtn = document.getElementById("syncRepoUrlBtn");

let timer = null;
let count = 0;
let isPause = false;
let currentSite = null;
const params = window.location.search;
let isAdminLogin = localStorage.getItem(LOGIN_STORAGE_KEY) === "1";
let adminPassword = "admin123";

// 切换主题逻辑（全局独立，不受临时缓存影响）
function switchTheme() {
    const now = onlineConfig.theme;
    let idx = THEME_LIST.indexOf(now);
    idx = (idx + 1) % THEME_LIST.length;
    const newTheme = THEME_LIST[idx];
    onlineConfig.theme = newTheme;
    tempConfig.theme = newTheme;
    saveLocalConfig();
    document.documentElement.setAttribute("data-theme", newTheme);
}
themeSwitchBtn.addEventListener("click", switchTheme);

// 页面初始化加载保存的主题
function applySavedTheme() {
    const saved = onlineConfig.theme;
    document.documentElement.setAttribute("data-theme", saved);
}

// 【核心】点击保存按钮，临时缓存写入正式配置并持久化
function doSaveConfig() {
    // 同步表单值到临时缓存
    tempConfig.waitSecond = Number(waitSecondInput.value) || 10;
    tempConfig.openNewTab = globalNewTabSwitch.checked;
    tempConfig.repoUrl = repoUrlInput.value.trim();
    // 临时缓存覆盖正式配置
    onlineConfig = JSON.parse(JSON.stringify(tempConfig));
    saveLocalConfig();
    // 刷新页面渲染
    renderAll();
    alert("配置保存成功！");
}
saveConfigBtn.addEventListener("click", doSaveConfig);

// 打开管理员弹窗时，同步正式配置到临时缓存+表单回填
function syncConfigToTempAndForm() {
    tempConfig = JSON.parse(JSON.stringify(onlineConfig));
    waitSecondInput.value = tempConfig.waitSecond;
    globalNewTabSwitch.checked = tempConfig.openNewTab;
    repoUrlInput.value = tempConfig.repoUrl || "";
}

function createRipple(e) {
    const btn = e.currentTarget;
    const rect = btn.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const ripple = document.createElement("span");
    ripple.className = "ripple";
    ripple.style.left = x + "px";
    ripple.style.top = y + "px";
    btn.appendChild(ripple);
    setTimeout(() => ripple.remove(), 500);
}
document.querySelectorAll("button").forEach(btn => btn.addEventListener("click", createRipple));

function openAdminModal() {
    adminModalMask.style.display = "flex";
    syncConfigToTempAndForm();
    renderAdminDomainList();
    if (!isPause) {
        modalOpenPauseFlag = true;
        isPause = true;
        pauseBtn.innerText = "恢复倒计时";
        circleLoader.classList.add("paused");
    }
}
function closeAdminModal() {
    adminModalMask.style.display = "none";
    if (modalOpenPauseFlag) {
        modalOpenPauseFlag = false;
        isPause = false;
        pauseBtn.innerText = "暂停倒计时";
        circleLoader.classList.remove("paused");
    }
}
adminModalClose.addEventListener("click", closeAdminModal);
openAdminBtn.addEventListener("click", openAdminModal);

// 仓库地址仅更新临时缓存，不自动保存
syncRepoUrlBtn.addEventListener("click", ()=>{
    const url = repoUrlInput.value.trim();
    tempConfig.repoUrl = url;
    alert("仓库地址已缓存，点击【保存配置】才会永久生效");
});

function isValidUrl(url) {
    return /^https?:\/\/.+/.test(url.trim());
}
function isUrlDuplicate(url, excludeId = null) {
    return tempConfig.domainConfig.some(item => item.url === url && item.id !== excludeId);
}
function genSiteId() {
    return "site_" + Date.now() + "_" + Math.random().toString(36).slice(2);
}

function getTopWeightOpenSite() {
    const openList = onlineConfig.domainConfig.filter(s => s.open);
    if (openList.length === 0) return null;
    openList.sort((a, b) => Number(a.weight || 1) - Number(b.weight || 10));
    return openList[0];
}

function autoSelectSiteOnLoad() {
    const lastId = onlineConfig.lastSelectSiteId;
    if (lastId) {
        const last = onlineConfig.domainConfig.find(s => s.id === lastId && s.open);
        if (last) {
            selectSite(last.id);
            return;
        }
    }
    const topSite = getTopWeightOpenSite();
    if (topSite) selectSite(topSite.id);
}

async function loadOnlineConfig() {
    try {
        const res = await fetch("./config.json?t=" + Date.now());
        if (!res.ok) throw "";
        const data = await res.json();
        onlineConfig = {
            ...baseOnlineConfig,
            waitSecond: Number(data.waitSecond) || baseOnlineConfig.waitSecond,
            openNewTab: Boolean(data.openNewTab),
            theme: data.theme || "",
            lastSelectSiteId: data.lastSelectSiteId || "",
            repoUrl: data.repoUrl || "",
            domainConfig: Array.isArray(data.domainConfig) ? data.domainConfig : []
        };
        onlineConfigLoaded = true;
    } catch (e) {}
    loadLocalConfig();
    tempConfig = JSON.parse(JSON.stringify(onlineConfig));
    applySavedTheme();
    renderAll();
    autoSelectSiteOnLoad();
}
function loadLocalConfig() {
    const cacheStr = localStorage.getItem(STORAGE_KEY);
    if (!cacheStr) return;
    try {
        const localData = JSON.parse(cacheStr);
        onlineConfig.waitSecond = Number(localData.waitSecond) ?? onlineConfig.waitSecond;
        onlineConfig.openNewTab = Boolean(localData.openNewTab);
        onlineConfig.theme = localData.theme ?? "";
        onlineConfig.lastSelectSiteId = localData.lastSelectSiteId ?? "";
        onlineConfig.repoUrl = localData.repoUrl ?? "";
        onlineConfig.domainConfig = Array.isArray(localData.domainConfig) ? localData.domainConfig : onlineConfig.domainConfig;
    } catch (err) {}
}
// 仅保存正式onlineConfig到本地
function saveLocalConfig() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
        waitSecond: onlineConfig.waitSecond,
        openNewTab: onlineConfig.openNewTab,
        theme: onlineConfig.theme,
        lastSelectSiteId: onlineConfig.lastSelectSiteId,
        repoUrl: onlineConfig.repoUrl,
        domainConfig: onlineConfig.domainConfig
    }));
}

// 导出：复制剪贴板 + 自动下载 config.json
async function exportOnlineConfigFile() {
    const jsonStr = JSON.stringify(onlineConfig, null, 2);
    // 1. 复制到剪贴板（保留原有功能）
    try {
        await navigator.clipboard.writeText(jsonStr);
    } catch (err) {
        alert("复制剪贴板失败，请手动复制文本：\n" + jsonStr);
    }
    // 2. 自动下载 config.json 文件
    const blob = new Blob([jsonStr], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "config.json";
    document.body.appendChild(a);
    a.click();
    URL.revokeObjectURL(a.href);
    a.remove();

    // 弹窗提示
    tipModal.style.display = "flex";
    const repo = onlineConfig.repoUrl.trim();
    if (repo && isValidUrl(repo)) {
        window.open(repo, "_blank");
    }
}
closeTipBtn.addEventListener("click", () => tipModal.style.display = "none");
exportOnlineConfigBtn.addEventListener("click", exportOnlineConfigFile);

function doLogin() {
    const p = adminPwdInput.value.trim();
    if (p === adminPassword) {
        isAdminLogin = true;
        localStorage.setItem(LOGIN_STORAGE_KEY, "1");
        loginArea.style.display = "none";
        editArea.style.display = "block";
        syncConfigToTempAndForm();
        renderAll();
    } else alert("密码错误");
}
loginBtn.addEventListener("click", doLogin);
function logoutAdmin() {
    isAdminLogin = false;
    localStorage.removeItem(LOGIN_STORAGE_KEY);
    loginArea.style.display = "block";
    editArea.style.display = "none";
    adminPwdInput.value = "";
    closeAdminModal();
    alert("已登出");
}
logoutBtn.addEventListener("click", logoutAdmin);
function changeAdminPassword() {
    const p = newPwdInput.value.trim();
    if (!p) return alert("密码不能为空");
    adminPassword = p;
    newPwdInput.value = "";
    alert("密码仅当前页面生效，刷新重置，不存入配置");
}

// 添加站点仅写入临时缓存
function addNewSite() {
    const name = siteNameInput.value.trim();
    const url = siteUrlInput.value.trim();
    const weight = Number(siteWeightInput.value) || 1;
    if (!name || !url) return alert("名称、链接不能为空");
    if (!isValidUrl(url)) return alert("链接必须 http/https 开头");
    if (isUrlDuplicate(url)) return alert("该域名已存在");
    tempConfig.domainConfig.push({
        id: genSiteId(),
        name,
        url,
        weight,
        open: false
    });
    siteNameInput.value = "";
    siteUrlInput.value = "";
    siteWeightInput.value = "10";
    renderAdminDomainList();
    alert("站点已缓存，点击【保存配置】永久生效");
}
addSiteBtn.addEventListener("click", addNewSite);

// 删除站点仅临时缓存
function deleteSite(siteId) {
    const t = tempConfig.domainConfig.find(s => s.id === siteId);
    if (!t) return;
    if (!confirm(`删除站点【${t.name}】？`)) return;
    tempConfig.domainConfig = tempConfig.domainConfig.filter(i => i.id !== siteId);
    renderAdminDomainList();
    alert("删除已缓存，点击【保存配置】永久生效");
}

function openEditModal(site) {
    editSiteId.value = site.id;
    editNameInput.value = site.name;
    editUrlInput.value = site.url;
    editWeightInput.value = Number(site.weight || 1);
    editOpenCheck.checked = site.open;
    editModal.style.display = "flex";
}
modalCancel.addEventListener("click", () => editModal.style.display = "none");

// 编辑站点保存到临时缓存
function saveEditSite() {
    const sid = editSiteId.value;
    const name = editNameInput.value.trim();
    const url = editUrlInput.value.trim();
    const weight = Number(editWeightInput.value) || 10;
    const open = editOpenCheck.checked;
    if (!name || !url) return alert("名称、链接不能为空");
    if (!isValidUrl(url)) return alert("链接必须 http/https 开头");
    if (isUrlDuplicate(url, sid)) return alert("域名已被其他站点占用");
    const item = tempConfig.domainConfig.find(s => s.id === sid);
    if (!item) return;
    item.name = name;
    item.url = url;
    item.weight = weight;
    item.open = open;
    editModal.style.display = "none";
    renderAdminDomainList();
    alert("修改已缓存，点击【保存配置】永久生效");
}
modalSave.addEventListener("click", saveEditSite);

// 站点开放/关闭切换仅更新临时缓存
document.addEventListener("change", (e) => {
    const radio = e.target;
    if (radio.name?.startsWith("stat_")) {
        const siteId = radio.name.replace("stat_", "");
        const site = tempConfig.domainConfig.find(s => s.id === siteId);
        if (site) site.open = radio.value === "1";
    }
});

function selectSite(siteId) {
    const t = onlineConfig.domainConfig.find(s => s.id === siteId);
    if (!t) return;
    currentSite = t;
    onlineConfig.lastSelectSiteId = siteId;
    tempConfig.lastSelectSiteId = siteId;
    saveLocalConfig();
    updateCanonical();
    updateJumpBtnStatus();
    resetCountdown();
    renderHomeDomainList();
}

function updateJumpBtnStatus() {
    jumpBtn.disabled = !(currentSite && currentSite.open);
}
function getJumpUrl() {
    return currentSite.url + params;
}
function updateCanonical() {
    canonicalTag.href = currentSite ? getJumpUrl() : "";
}
function goJump() {
    if (!currentSite || !currentSite.open) {
        alert("站点未开放，无法自动跳转");
        return;
    }
    clearInterval(timer);
    const u = getJumpUrl();
    if (onlineConfig.openNewTab) window.open(u, "_blank");
    else location.href = u;
}
jumpBtn.addEventListener("click", goJump);

function resetCountdown() {
    clearInterval(timer);
    isPause = false;
    modalOpenPauseFlag = false;
    pauseBtn.innerText = "暂停倒计时";
    count = Number(onlineConfig.waitSecond);
    countDom.innerText = count;
    barDom.style.width = "0%";
    circleLoader.classList.remove("paused");
    startTimer();
}
function startTimer() {
    timer = setInterval(() => {
        if (!currentSite || !currentSite.open || isPause) return;
        count--;
        countDom.innerText = count;
        const total = onlineConfig.waitSecond;
        const pct = ((total - count) / total) * 100;
        barDom.style.width = pct + "%";
        if (count <= 0) {
            clearInterval(timer);
            goJump();
        }
    }, 1000);
}
pauseBtn.addEventListener("click", () => {
    if (modalOpenPauseFlag) return;
    isPause = !isPause;
    pauseBtn.innerText = isPause ? "恢复倒计时" : "暂停倒计时";
    circleLoader.classList.toggle("paused", isPause);
});

function renderHomeDomainList() {
    homeDomainWrap.innerHTML = "";
    let list = [...onlineConfig.domainConfig];
    list.sort((a, b) => Number(a.weight || 1) - Number(b.weight || 10));
    if (list.length === 0) {
        homeDomainWrap.innerHTML = `<div class="domain-empty">暂无站点，请登录管理员添加</div>`;
        currentSite = null;
        return;
    }
    list.forEach(site => {
        const div = document.createElement("div");
        div.className = "home-domain-item " + (site.open ? "" : "close-state");
        div.dataset.id = site.id;
        if (currentSite && currentSite.id === site.id) div.classList.add("selected");
        div.innerHTML = `
            <div class="home-name-row">
                <span class="domain-name">${site.name}</span>
                <span class="${site.open ? 'domain-status-tag-open' : 'domain-status-tag-close'}">${site.open ? '已开放' : '未开放'}</span>
            </div>
            <div class="domain-url">${site.url}</div>
        `;
        div.addEventListener("click", () => selectSite(site.id));
        homeDomainWrap.appendChild(div);
    })
}

function renderAdminDomainList() {
    adminDomainWrap.innerHTML = "";
    if (!isAdminLogin || tempConfig.domainConfig.length === 0) return;
    const title = document.createElement("div");
    title.className = "admin-domain-title";
    title.innerText = "站点列表（权重数字越小，排队越靠前、自动优先跳转）";
    adminDomainWrap.appendChild(title);
    let list = [...tempConfig.domainConfig];
    list.sort((a,b)=>Number(a.weight||10)-Number(b.weight||10));
    list.forEach(site => {
        const item = document.createElement("div");
        item.className = "admin-domain-item";
        item.dataset.id = site.id;
        item.innerHTML = `
            <div class="admin-domain-info">
                <div class="domain-name">${site.name} | 排队序号权重:${site.weight || 1}</div>
                <div class="domain-url">${site.url}</div>
            </div>
            <div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;">
                <div class="status-radio-group">
                    <label class="radio-open">
                        <input type="radio" name="stat_${site.id}" value="1" ${site.open?"checked":""}>开放
                    </label>
                    <label class="radio-close">
                        <input type="radio" name="stat_${site.id}" value="0" ${!site.open?"checked":""}>关闭
                    </label>
                </div>
                <div class="domain-op-btn-group">
                    <button class="edit-site-btn" data-id="${site.id}">编辑</button>
                    <button class="del-site-btn" data-id="${site.id}">删除</button>
                </div>
            </div>
        `;
        adminDomainWrap.appendChild(item);
        const radios = item.querySelectorAll(`input[name="stat_${site.id}"]`);
        radios.forEach(r=>{
            r.onchange = null;
        });
        item.querySelector(".edit-site-btn").onclick = ()=>openEditModal(site);
        item.querySelector(".del-site-btn").onclick = ()=>deleteSite(site.id);
    })
}

function renderAll() {
    waitSecondInput.value = onlineConfig.waitSecond;
    globalNewTabSwitch.checked = onlineConfig.openNewTab;
    repoUrlInput.value = onlineConfig.repoUrl || "";
    loginArea.style.display = isAdminLogin ? "none" : "block";
    editArea.style.display = isAdminLogin ? "block" : "none";
    renderHomeDomainList();
    renderAdminDomainList();
    updateJumpBtnStatus();
}

window.addEventListener("load", loadOnlineConfig);
window.addEventListener("offline", ()=>alert("网络断开"));
if (document.referrer) sourceTip.innerText = "来路页面：" + document.referrer;
</script>
</body>
