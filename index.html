<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cpolar 隧道自动跳转</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome 图标 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <!-- 自定义Tailwind配色 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        cpolar: '#ff4f00',
                        dark: '#0f172a'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .shadow-glow {
                box-shadow: 0 0 30px rgba(59, 130, 246, 0.25);
            }
            .spin-slow {
                animation: spin 2s linear infinite;
            }
            @keyframes spin {
                from { transform: rotate(0deg); }
                to { transform: rotate(360deg); }
            }
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-dark to-slate-900 flex items-center justify-center p-4">
    <div class="w-full max-w-lg bg-slate-800/60 backdrop-blur-md rounded-2xl p-8 shadow-glow border border-slate-700/50">
        <!-- 头部标题 -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-cpolar/10 text-cpolar text-3xl mb-4">
                <i class="fa fa-link"></i>
            </div>
            <h1 class="text-[26px] font-bold text-white mb-2">Cpolar 隧道自动跳转</h1>
            <p class="text-slate-400 text-sm">自动同步 Termux 最新临时公网域名</p>
        </div>

        <!-- 状态展示区域 -->
        <div id="status-box" class="rounded-xl bg-slate-900/70 p-6 mb-6 min-h-[140px] flex flex-col items-center justify-center text-center">
            <div id="loading-icon" class="text-primary text-4xl spin-slow mb-3">
                <i class="fa fa-circle-o-notch"></i>
            </div>
            <p id="status-text" class="text-slate-300 text-lg">正在拉取最新隧道地址...</p>
            <p id="domain-text" class="text-cpolar font-mono mt-2 break-all hidden"></p>
        </div>

        <!-- 操作按钮 -->
        <div class="grid grid-cols-2 gap-4">
            <button id="refresh-btn" class="w-full py-3 rounded-lg bg-primary hover:bg-primary/80 text-white font-medium transition-all flex items-center justify-center gap-2">
                <i class="fa fa-refresh"></i> 手动刷新域名
            </button>
            <button id="copy-btn" disabled class="w-full py-3 rounded-lg bg-slate-700 text-slate-500 font-medium cursor-not-allowed flex items-center justify-center gap-2">
                <i class="fa fa-copy"></i> 复制隧道地址
            </button>
        </div>

        <!-- 底部说明 -->
        <div class="mt-6 text-center text-xs text-slate-500">
            <i class="fa fa-info-circle"></i> 域名由 Termux 定时同步至 domain.json，更新间隔30秒
        </div>
    </div>

    <script>
        // DOM元素缓存
        const statusBox = document.getElementById('status-box');
        const loadingIcon = document.getElementById('loading-icon');
        const statusText = document.getElementById('status-text');
        const domainText = document.getElementById('domain-text');
        const refreshBtn = document.getElementById('refresh-btn');
        const copyBtn = document.getElementById('copy-btn');

        let targetUrl = '';
        let countDownTimer = null;

        // 拉取域名核心函数（已加入cpolar公网域名校验，拦截127.0.0.1内网地址）
        async function fetchDomain() {
            // 重置UI状态
            loadingIcon.classList.remove('hidden');
            domainText.classList.add('hidden');
            copyBtn.disabled = true;
            copyBtn.className = 'w-full py-3 rounded-lg bg-slate-700 text-slate-500 font-medium cursor-not-allowed flex items-center justify-center gap-2';
            statusText.textContent = '正在拉取最新隧道地址...';
            statusBox.classList.remove('border-red-500/50', 'border-green-500/50');
            statusBox.classList.add('border-primary/40');

            // 清除旧倒计时
            if (countDownTimer) clearInterval(countDownTimer);

            try {
                // 加时间戳防止浏览器缓存旧domain.json
                const res = await fetch('./domain.json?t=' + Date.now());
                if (!res.ok) throw new Error('文件读取失败，请等待Termux同步');

                const data = await res.json();
                targetUrl = data.latest;

                // 关键修复：校验必须是cpolar公网域名，拦截本地127.0.0.1地址
                if (!targetUrl || targetUrl === 'null' || !targetUrl.includes('cpolar.')) {
                    throw new Error('获取到的不是cpolar公网隧道，请检查Termux脚本');
                }

                // 成功状态UI
                loadingIcon.classList.add('hidden');
                statusBox.classList.remove('border-primary/40');
                statusBox.classList.add('border-green-500/50');
                statusText.textContent = '获取到有效隧道地址，即将自动跳转';
                domainText.textContent = targetUrl;
                domainText.classList.remove('hidden');

                // 启用复制按钮
                copyBtn.disabled = false;
                copyBtn.className = 'w-full py-3 rounded-lg bg-cpolar hover:bg-cpolar/80 text-white font-medium transition-all flex items-center justify-center gap-2';

                // 3秒倒计时跳转
                let sec = 3;
                countDownTimer = setInterval(() => {
                    sec--;
                    statusText.textContent = `获取到有效隧道地址，${sec}秒后自动跳转`;
                    if (sec <= 0) {
                        clearInterval(countDownTimer);
                        window.location.href = targetUrl;
                    }
                }, 1000);

            } catch (err) {
                // 错误状态UI
                loadingIcon.classList.add('hidden');
                statusBox.classList.remove('border-primary/40');
                statusBox.classList.add('border-red-500/50');
                statusText.textContent = `获取域名失败：${err.message}`;
                domainText.classList.add('hidden');
            }
        }

        // 复制链接功能
        copyBtn.addEventListener('click', async () => {
            if (!targetUrl) return;
            await navigator.clipboard.writeText(targetUrl);
            statusText.textContent = '隧道地址已复制到剪贴板！';
            setTimeout(() => fetchDomain(), 1500);
        });

        // 手动刷新按钮绑定
        refreshBtn.addEventListener('click', fetchDomain);

        // 页面加载自动执行
        window.addEventListener('DOMContentLoaded', fetchDomain);
    </script>
</body>
</html>
