name: 中转站自动部署Pages
on:
  push:
    branches: [ main ]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy_site:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库源码
        uses: actions/checkout@v4
      - name: 配置Pages
        uses: actions/configure-pages@v5
      - name: 打包网站文件
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./
      - name: 发布网站
        uses: actions/deploy-pages@v4
